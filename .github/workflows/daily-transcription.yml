name: Daily YouTube Transcription

on:
  schedule:
    # 6:00 AM UTC = 11:30 AM IST
    - cron: '0 6 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Explicitly install yt-dlp to ensure latest version
          pip install --upgrade yt-dlp

      - name: Restore Cookies
        env:
          YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}
        run: |
          if [ -n "$YOUTUBE_COOKIES_BASE64" ]; then
            echo "$YOUTUBE_COOKIES_BASE64" | base64 -d > youtube_cookies.txt
            echo "✅ Cookies restored from secrets"
          else
            echo "⚠️ No cookies found in secrets. YouTube download might fail."
          fi
      
      - name: Run transcription pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          METADATA_PROVIDER: ${{ secrets.METADATA_PROVIDER }}
          # Force non-interactive mode just in case
          AUTOMATED_MODE: "True"
        run: |
          echo "🚀 Starting transcription pipeline..."
          python run_full_audio_pipeline.py
          echo "✅ Pipeline completed"
      
      - name: Commit transcripts and memory
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Add new transcripts
          git add Transcripts/
          git add youtube_memory.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # Commit with timestamp
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "Daily transcripts: $TIMESTAMP"
            
            # Push to repository
            git push
          fi
      
      - name: Upload logs as artifact
        if: always()  # Run even if job fails
        uses: actions/upload-artifact@v4
        with:
          name: transcription-logs-${{ github.run_number }}
          path: |
            *.log
            downloads/*.info.json
          retention-days: 7
